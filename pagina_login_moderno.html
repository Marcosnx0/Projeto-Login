<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Moderno</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    .background {
      position: absolute;
      width: 100%;
      height: 100%;
      background: url('https://www.transparenttextures.com/patterns/cubes.png');
      opacity: 0.1;
      animation: moveBg 20s linear infinite;
    }
    @keyframes moveBg {
      from { transform: translate(0,0); }
      to { transform: translate(-200px,-200px); }
    }
    .login-container {
      position: relative;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(15px);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      width: 350px;
      text-align: center;
      color: #fff;
      animation: fadeIn 1.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-container h2 {
      margin-bottom: 20px;
      font-weight: 600;
    }
    .input-field {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      outline: none;
      background: rgba(255,255,255,0.2);
      color: #fff;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .input-field::placeholder {
      color: #eee;
    }
    .input-field:focus {
      background: rgba(255,255,255,0.3);
      box-shadow: 0 0 10px #2575fc;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #2575fc, #6a11cb);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      transition: transform 0.2s, box-shadow 0.3s;
    }
    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #6a11cb;
    }
    .links {
      margin-top: 15px;
      font-size: 14px;
    }
    .links a {
      color: #fff;
      text-decoration: none;
      transition: color 0.3s;
    }
    .links a:hover {
      color: #ffdd57;
    }
    @media (max-width: 400px) {
      .login-container {
        width: 90%;
        padding: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="background"></div>
  <div class="login-container">
    <h2>Bem-vindo</h2>
    <form>
      <input type="text" class="input-field" placeholder="Usuário" required>
      <input type="password" class="input-field" placeholder="Senha" required>
      <button type="submit" class="btn">Entrar</button>
    </form>
    <div class="links">
      <a href="#">Esqueceu a senha?</a> | <a href="#">Criar conta</a>
    </div>
  </div>
</body>
</html>
